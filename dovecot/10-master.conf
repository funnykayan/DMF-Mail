# /etc/dovecot/conf.d/10-master.conf – DMF Mail

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl  = yes
  }
}

service lmtp {
  # LMTP socket for Postfix (not used in this setup – using virtual delivery)
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode  = 0600
    user  = postfix
    group = postfix
  }
}

# Auth socket shared with Postfix for SASL
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode  = 0660
    user  = postfix
    group = postfix
  }
  unix_listener auth-userdb {
    mode  = 0600
    user  = vmail
    group = vmail
  }
  user = dovecot
}

service auth-worker {
  user = vmail
}

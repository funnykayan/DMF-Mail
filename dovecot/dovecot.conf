# /etc/dovecot/dovecot.conf – DMF Mail
# Managed by DMF Mail setup.

# Listen on all interfaces
listen = *, ::

# Supported protocols
protocols = imap lmtp

# Include modular config snippets
!include conf.d/*.conf
!include_try local.conf

# Log to syslog
log_path = syslog
syslog_facility = mail
auth_verbose = no
mail_debug = no

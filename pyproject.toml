[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
]
ignore = [
    "S105",  # hardcoded-password-string (false positives in config defaults)
    "S106",  # hardcoded-password-func-arg
    "S603",  # subprocess-without-shell-equals-true (used intentionally)
    "S607",  # start-process-with-partial-path
    "B008",  # function-call-in-default-argument — idiomatic FastAPI Depends() pattern
    "B904",  # raise-without-from-inside-except — HTTPException wrapping is intentional
]

[tool.ruff.lint.per-file-ignores]
"backend/auth.py" = ["S"]   # auth module intentionally uses crypto primitives

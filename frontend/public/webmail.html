<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMF Mail – Webmail</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app-page">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/>
        <path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/>
      </svg>
      <span>DMF Mail</span>
    </div>

    <button class="btn btn-primary compose-btn" id="compose-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"/></svg>
      Compose
    </button>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-folder="INBOX" id="nav-inbox">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M2 3.5A1.5 1.5 0 013.5 2h13A1.5 1.5 0 0118 3.5v13a1.5 1.5 0 01-1.5 1.5h-13A1.5 1.5 0 012 16.5v-13zm11.78 4.22a.75.75 0 010 1.06l-3.25 3.25a.75.75 0 01-1.06 0L7.22 9.78a.75.75 0 011.06-1.06L10 10.44l2.72-2.72a.75.75 0 011.06 0z" clip-rule="evenodd"/></svg>
        Inbox <span id="inbox-count" class="badge hidden"></span>
      </a>
      <a href="#" class="nav-item" data-folder="Sent" id="nav-sent">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M3.105 2.289a.75.75 0 00-.826.95l1.414 4.925A1.5 1.5 0 005.135 9.25h6.115a.75.75 0 010 1.5H5.135a1.5 1.5 0 00-1.442 1.086l-1.414 4.926a.75.75 0 00.826.95 28.896 28.896 0 0015.293-7.154.75.75 0 000-1.115A28.897 28.897 0 003.105 2.289z"/></svg>
        Sent
      </a>
      <a href="#" class="nav-item" data-folder="Drafts">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M5.433 13.917l1.262-3.155A4 4 0 017.58 9.42l6.92-6.918a2.121 2.121 0 013 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 01-.629-.629z"/><path d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0010 3H4.75A2.75 2.75 0 002 5.75v9.5A2.75 2.75 0 004.75 18h9.5A2.75 2.75 0 0017 15.25V10a.75.75 0 00-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5z"/></svg>
        Drafts
      </a>
      <a href="#" class="nav-item" data-folder="Trash">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 006 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 10.23 1.482l.149-.022.841 10.518A2.75 2.75 0 007.596 19h4.807a2.75 2.75 0 002.742-2.53l.841-10.52.149.023a.75.75 0 00.23-1.482A41.03 41.03 0 0014 4.193V3.75A2.75 2.75 0 0011.25 1h-2.5zM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4zM8.58 7.72a.75.75 0 00-1.5.06l.3 7.5a.75.75 0 101.5-.06l-.3-7.5zm4.34.06a.75.75 0 10-1.5-.06l-.3 7.5a.75.75 0 101.5.06l.3-7.5z" clip-rule="evenodd"/></svg>
        Trash
      </a>
    </nav>

    <div class="sidebar-footer">
      <div id="user-email" class="user-badge"></div>
      <a href="#" id="logout-btn" class="logout-link">Sign out</a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <!-- Mail list panel -->
    <div class="mail-list-panel" id="mail-list-panel">
      <div class="panel-header">
        <h2 id="folder-title">Inbox</h2>
        <button class="btn btn-ghost btn-sm" id="refresh-btn" title="Refresh">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clip-rule="evenodd"/></svg>
        </button>
      </div>
      <div id="mail-list-loading" class="loading-state hidden">Loading…</div>
      <div id="mail-list-empty" class="empty-state hidden">No messages in this folder.</div>
      <div id="mail-list" class="mail-list"></div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- Mail view panel -->
    <div class="mail-view-panel hidden" id="mail-view-panel">
      <div class="panel-header">
        <button class="btn btn-ghost btn-sm" id="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 111.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z" clip-rule="evenodd"/></svg>
          Back
        </button>
        <button class="btn btn-ghost btn-sm" id="reply-btn">Reply</button>
      </div>
      <div id="mail-view-content" class="mail-view-content"></div>
    </div>
  </main>

  <!-- Compose modal -->
  <div class="modal-overlay hidden" id="compose-modal">
    <div class="modal compose-modal">
      <div class="modal-header">
        <h3>New Message</h3>
        <button class="btn btn-ghost btn-sm" id="compose-close">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="compose-to" placeholder="To (comma-separated)" class="compose-field" />
        <input type="text" id="compose-cc" placeholder="Cc (optional)" class="compose-field" />
        <input type="text" id="compose-subject" placeholder="Subject" class="compose-field" />
        <textarea id="compose-body" placeholder="Write your message here…" class="compose-body"></textarea>
        <div id="compose-error" class="error-msg hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="compose-cancel">Cancel</button>
        <button class="btn btn-primary" id="compose-send">Send</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/webmail.js"></script>
</body>
</html>

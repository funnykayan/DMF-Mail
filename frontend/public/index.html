<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMF Mail – Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
        <path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/>
        <path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/>
      </svg>
    </div>
    <h1>DMF Mail</h1>
    <p class="subtitle">dutchforcesrp.nl</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@dutchforcesrp.nl" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign in</button>
    </form>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (DMFMail.getToken()) {
      if (DMFMail.isAdmin()) {
        window.location.href = '/admin.html';
      } else {
        window.location.href = '/webmail.html';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.add('hidden');

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await DMFMail.login(email, password);
        if (DMFMail.isAdmin()) {
          window.location.href = '/admin.html';
        } else {
          window.location.href = '/webmail.html';
        }
      } catch (err) {
        errEl.textContent = err.message || 'Login failed';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>

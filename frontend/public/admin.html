<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMF Mail – Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app-page">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/>
        <path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/>
      </svg>
      <span>DMF Mail</span>
    </div>

    <nav class="sidebar-nav">
      <a href="/webmail.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M2 3.5A1.5 1.5 0 013.5 2h13A1.5 1.5 0 0118 3.5v13a1.5 1.5 0 01-1.5 1.5h-13A1.5 1.5 0 012 16.5v-13z" clip-rule="evenodd"/></svg>
        Webmail
      </a>
      <a href="/admin.html" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M10 8a3 3 0 100-6 3 3 0 000 6zM3.465 14.493a1.23 1.23 0 00.41 1.412A9.957 9.957 0 0010 18c2.31 0 4.438-.784 6.131-2.1.43-.333.604-.903.408-1.41a7.002 7.002 0 00-13.074.003z"/></svg>
        Manage Accounts
      </a>
    </nav>

    <div class="sidebar-footer">
      <div id="user-email" class="user-badge"></div>
      <a href="#" id="logout-btn" class="logout-link">Sign out</a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content admin-main">
    <div class="admin-header">
      <h2>Mail Accounts</h2>
      <button class="btn btn-primary" id="new-account-btn">+ New Account</button>
    </div>

    <div id="accounts-loading" class="loading-state">Loading accounts…</div>
    <div id="accounts-error" class="error-msg hidden"></div>

    <table class="accounts-table" id="accounts-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Role</th>
          <th>Quota (MB)</th>
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="accounts-tbody"></tbody>
    </table>
  </main>

  <!-- Create/Edit Account Modal -->
  <div class="modal-overlay hidden" id="account-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Account</h3>
        <button class="btn btn-ghost btn-sm" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Email</label>
          <div class="email-input-group">
            <input type="text" id="acc-username" placeholder="username" />
            <span class="email-domain">@dutchforcesrp.nl</span>
          </div>
        </div>
        <div class="form-group" id="password-group">
          <label>Password</label>
          <input type="password" id="acc-password" placeholder="Min. 8 characters" />
        </div>
        <div class="form-group">
          <label>Quota (MB)</label>
          <input type="number" id="acc-quota" value="500" min="50" max="10000" />
        </div>
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="acc-admin" />
            Admin account
          </label>
        </div>
        <div class="form-group checkbox-group" id="active-group">
          <label>
            <input type="checkbox" id="acc-active" checked />
            Active
          </label>
        </div>
        <div id="modal-error" class="error-msg hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Create Account</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Delete Account</h3>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong id="delete-email-label"></strong>?</p>
        <p class="text-muted">This will permanently remove the account and all its emails.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="delete-cancel">Cancel</button>
        <button class="btn btn-danger" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
